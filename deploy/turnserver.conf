# TURN Server Configuration (coturn)
# Этот конфиг используется только если включен профиль with-turn

# Listening port
listening-port=3478

# TLS/DTLS ports (опционально)
tls-listening-port=5349

# IP адреса
listening-ip=0.0.0.0
# relay-ip=YOUR_SERVER_IP
# external-ip=YOUR_SERVER_IP

# Релейные порты
min-port=10000
max-port=20000

# Аутентификация
# В продакшене использовать реальные credentials
user=meshvpn:meshvpn_secret_key_change_this

# Realm
realm=your-domain.ru

# Логирование
verbose
log-file=/var/log/turnserver.log

# Безопасность
no-multicast-peers
no-loopback-peers

# Производительность
total-quota=100
max-bps=0
